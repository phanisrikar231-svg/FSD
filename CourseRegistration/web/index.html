<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Course Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Student Course Registration</h1>
        <form action="RegisterServlet" method="post">
            <div class="form-group">
                <label>Full Name:</label>
                <input type="text" name="fullName" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label>Email:</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" name="password" placeholder="Create a password" required>
            </div>
            <div class="form-group">
                <label>Phone:</label>
                <input type="text" name="phone" placeholder="Enter your phone number">
            </div>
            <div class="form-group">
                <label>Department:</label>
                <select name="department">
                    <option value="">-- Select Department --</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Mathematics">Mathematics</option>
                    <option value="Physics">Physics</option>
                    <option value="English">English</option>
                </select>
            </div>
            <div class="form-group">
                <label>Select Course:</label>
                <select name="courseId">
                    <option value="">-- Select Course --</option>
                    <option value="1">Mathematics (MATH101)</option>
                    <option value="2">Physics (PHY101)</option>
                    <option value="3">Computer Science (CS101)</option>
                    <option value="4">English (ENG101)</option>
                    <option value="5">Database Management (DB101)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Registration Date:</label>
                <input type="date" name="regDate" required>
            </div>
            <button type="submit">Register</button>
        </form>
        <p style="text-align:center; margin-top:15px;">Already registered? <a href="login.html">Login here</a></p>
    </div>
</body>
</html>
